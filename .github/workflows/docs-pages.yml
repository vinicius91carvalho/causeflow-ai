# Build marketing website (static export) + public-docs (mint export) for GitHub Pages.
# Layout: website at /causeflow-ai/, docs at /causeflow-ai/docs/
# AC-065: mint export only for docs — no Mintlify-hosted deployment commands.
name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "public-docs/**"
      - "web/apps/website/**"
      - "web/packages/shared/**"
      - "web/packages/ui/**"
      - "web/packages/analytics/**"
      - "web/packages/forms/**"
      - "web/package.json"
      - "web/pnpm-lock.yaml"
      - "web/pnpm-workspace.yaml"
      - ".github/workflows/docs-pages.yml"
      - ".github/scripts/rewrite-github-pages-base.mjs"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build website + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install website dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build website static export
        working-directory: web
        run: pnpm --filter @causeflow/website build:github-pages
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_SITE_URL: https://vinicius91carvalho.github.io/causeflow-ai
          NEXT_PUBLIC_DASHBOARD_URL: http://localhost:3001
          NEXT_PUBLIC_DEPLOYMENT_STAGE: development

      - name: Stage website into _site
        run: |
          mkdir -p _site
          cp -a web/apps/website/out/. _site/

      - name: Install mint CLI
        # Same pin as public-docs/Dockerfile - open-source CLI, no Mintlify account.
        run: npm install -g mint@4.2.666

      - name: Export public-docs (mint export)
        working-directory: public-docs
        run: |
          mint export --output export.zip --telemetry false
          mkdir -p ../_site/docs
          unzip -q export.zip -d ../_site/docs
          rm -f export.zip

      # Docs live under /causeflow-ai/docs/; mint export emits root-absolute `/` assets.
      - name: Rewrite docs export for GitHub Pages base path
        run: node .github/scripts/rewrite-github-pages-base.mjs _site/docs /causeflow-ai/docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
