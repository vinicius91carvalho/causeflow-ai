# CauseFlow — monorepo-root umbrella OSS platform stack (AC-062).
#
# Brings up the existing web OSS platform services plus public docs:
#   causeflow-postgres, redis, hindsight, causeflow-api, causeflow-worker,
#   causeflow-website (host :3000), causeflow-dashboard (host :3001),
#   causeflow-docs (host :5181 → container :3000).
#
# Paths inside included Compose files resolve relative to those files
# (web/ → ../core, public-docs/ → its own Dockerfile). Relay is intentionally
# excluded; start it from relay/ when needed.

name: causeflow-oss

include:
  - path: ./web/docker-compose.yml
  - path: ./public-docs/docker-compose.yml
