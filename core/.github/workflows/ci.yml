name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint

  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify no unresolved path aliases in compiled output
        run: |
          if grep -rEl "from '@(shared|modules)/'" dist/ --include="*.js" 2>/dev/null | grep -q .; then
            echo "::error::Compiled output contains unresolved TypeScript path aliases."
            echo "Use relative imports instead of @shared/ @modules/"
            grep -rEh "from '@(shared|modules)/'" dist/ --include="*.js" | sort -u
            exit 1
          fi
          echo "No unresolved path aliases in compiled output"

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:run

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      localstack:
        image: localstack/localstack:3.8
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,sqs
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      DYNAMODB_ENDPOINT: http://localhost:4566
      SQS_ENDPOINT: http://localhost:4566
      DYNAMODB_TABLE_NAME: causeflow
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install awslocal
        run: pip install awscli-local
      - name: Init LocalStack resources
        run: bash infra/localstack/init/01-create-resources.sh
      - name: Run integration tests
        run: pnpm test:integration

