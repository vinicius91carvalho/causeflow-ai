# CauseFlow — open-source local runtime (AC-039).
#
# `docker compose up -d` brings up ONLY the local-runtime services:
#   causeflow-postgres, redis, hindsight, causeflow-api, causeflow-worker,
#   causeflow-test-app (AC-058 runnable integration target).
#
# No ministack / LocalStack, no Langfuse, no customer sample services, no relay.
# The API and worker boot with a clean environment (no AWS_*, STRIPE_*,
# CLERK_*, SENTRY_*, LANGFUSE_*, SVIX_*, SLACK_*, COMPOSIO_*, MASTRA_* env vars)
# and contact only Postgres, Redis, Hindsight and (optionally) Anthropic at
# startup. See project_specs.xml AC-039..AC-053.
#
# The API listens on the assigned PORT (5171) inside the container and is
# published on the host at 3099 so `curl http://localhost:3099/health` matches
# the AC-039 contract.

services:
  causeflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-causeflow}
      POSTGRES_USER: ${POSTGRES_USER:-causeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-causeflow}
    ports:
      - '5439:5432'
    volumes:
      - causeflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-causeflow} -d ${POSTGRES_DB:-causeflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - causeflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  causeflow-test-app:
    build:
      context: ./test-app
      dockerfile: Dockerfile
    ports:
      - '5190:5190'
    environment:
      TEST_APP_PORT: '5190'
      TEST_APP_HOST: '0.0.0.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5190/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 3s

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - '8888:8888'
      - '9999:9999'
    environment:
      # Default to the keyless `none` LLM provider so Hindsight boots with zero
      # paid credentials (AC-039: ANTHROPIC_API_KEY is optional). Hindsight runs
      # in chunks-only memory mode; set HINDSIGHT_API_LLM_PROVIDER=anthropic
      # (and ANTHROPIC_API_KEY) to enable LLM-powered extraction.
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-none}
      HINDSIGHT_API_LLM_API_KEY: ${ANTHROPIC_API_KEY:-}
      HINDSIGHT_API_ENABLE_BANK_CONFIG_API: 'false'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  causeflow-api:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      causeflow-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      causeflow-test-app:
        condition: service_healthy
    environment:
      CAUSEFLOW_RUNTIME: oss
      NODE_ENV: development
      PORT: '5171'
      STUB_UPSTREAM_BASE_URL: http://causeflow-test-app:5190
      STUB_UPSTREAM_CORE_BASE_URL: http://causeflow-api:5171
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_USER:-causeflow}:${POSTGRES_PASSWORD:-causeflow}@causeflow-postgres:5432/${POSTGRES_DB:-causeflow}
      POSTGRES_HOST: causeflow-postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://redis:6379
      HINDSIGHT_BASE_URL: http://hindsight:8888
      HINDSIGHT_API_KEY: ${HINDSIGHT_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-oss-dev-jwt-secret-change-me}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-oss-dev-webhook-secret}
      DEDUP_WINDOW_MINUTES: ${DEDUP_WINDOW_MINUTES:-60}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_CONNECTOR: ornith
      # Literal host-gateway URL — do NOT interpolate LLM_BASE_URL from .env
      # (host-dev 127.0.0.1 is unreachable inside the container; AC-053).
      LLM_BASE_URL: http://host.docker.internal:8081/v1
      LLM_MODEL: Ornith-1.0-9B-code
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      OPENCODE_BASE_URL: ${OPENCODE_BASE_URL:-https://opencode.ai/zen/go/v1}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-deepseek-v4-flash-free}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_NIM_BASE_URL: ${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_NIM_MODEL: ${NVIDIA_NIM_MODEL:-deepseek-ai/deepseek-v4-flash}
      ANTHROPIC_TRIAGE_MODEL: ${ANTHROPIC_TRIAGE_MODEL:-}
      ANTHROPIC_INVESTIGATION_MODEL: ${ANTHROPIC_INVESTIGATION_MODEL:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BBjPUFtJIDWZooY9BmoWJ3wpSsZsWGXaSFFjU6ieR8ngON2F07g0MG_MY_1DrrmPNPRubdZKihE-ALJj9uYT5cE}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-Qrn4MAoZ29endhT_VFnzU55Q25C5rBqwldnZBePUwMM}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:push@causeflow.io}
      # No AWS/Stripe/Clerk/Langfuse env vars — this is the OSS runtime (AC-039/AC-053).
    ports:
      - '3099:5171'
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5171/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  causeflow-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      causeflow-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # AC-045: No INCIDENT_ID / TENANT_ID → the worker boots into BullMQ
      # consumer mode: it listens for investigation jobs on the
      # causeflow-investigation BullMQ queue and runs them as they arrive.
      CAUSEFLOW_RUNTIME: oss
      NODE_ENV: development
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_USER:-causeflow}:${POSTGRES_PASSWORD:-causeflow}@causeflow-postgres:5432/${POSTGRES_DB:-causeflow}
      POSTGRES_HOST: causeflow-postgres
      POSTGRES_PORT: '5432'
      REDIS_URL: redis://redis:6379
      HINDSIGHT_BASE_URL: http://hindsight:8888
      HINDSIGHT_API_KEY: ${HINDSIGHT_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_CONNECTOR: ornith
      # Literal host-gateway URL — do NOT interpolate LLM_BASE_URL from .env
      # (host-dev 127.0.0.1 is unreachable inside the container; AC-053).
      LLM_BASE_URL: http://host.docker.internal:8081/v1
      LLM_MODEL: Ornith-1.0-9B-code
      OPENCODE_API_KEY: ${OPENCODE_API_KEY:-}
      OPENCODE_BASE_URL: ${OPENCODE_BASE_URL:-https://opencode.ai/zen/go/v1}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-deepseek-v4-flash-free}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_NIM_BASE_URL: ${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_NIM_MODEL: ${NVIDIA_NIM_MODEL:-deepseek-ai/deepseek-v4-flash}
      ANTHROPIC_TRIAGE_MODEL: ${ANTHROPIC_TRIAGE_MODEL:-}
      ANTHROPIC_INVESTIGATION_MODEL: ${ANTHROPIC_INVESTIGATION_MODEL:-}
      JWT_SECRET: ${JWT_SECRET:-oss-dev-jwt-secret-change-me}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-oss-dev-webhook-secret}
      DEDUP_WINDOW_MINUTES: ${DEDUP_WINDOW_MINUTES:-60}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BBjPUFtJIDWZooY9BmoWJ3wpSsZsWGXaSFFjU6ieR8ngON2F07g0MG_MY_1DrrmPNPRubdZKihE-ALJj9uYT5cE}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-Qrn4MAoZ29endhT_VFnzU55Q25C5rBqwldnZBePUwMM}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:push@causeflow.io}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"process.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  causeflow_postgres_data:
  causeflow_redis_data:
