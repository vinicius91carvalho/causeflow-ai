name: Website Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      stage:
        description: 'Deployment stage'
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: website-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo check-types --filter=@causeflow/website...
        env:
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
          NEXT_PUBLIC_CLARITY_ID: ${{ vars.NEXT_PUBLIC_CLARITY_ID }}

      - name: Lint
        run: pnpm turbo lint --filter=@causeflow/website...

      - name: Unit tests
        run: pnpm turbo test --filter=@causeflow/website...

      - name: Build
        run: pnpm turbo build --filter=@causeflow/website...
        env:
          NEXT_PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA4_MEASUREMENT_ID }}
          NEXT_PUBLIC_CLARITY_ID: ${{ vars.NEXT_PUBLIC_CLARITY_ID }}
          APP_VERSION: ${{ github.sha }}

  # -------------------------------------------------------------------------
  # Deploy: OSS build — SST is removed (AC-050). The website now ships as a
  # Docker image. Run `docker compose build causeflow-website` from the
  # monorepo root, then publish and deploy the image on your host of choice.
  # See apps/website/Dockerfile and the docker-compose.yml at the repo root.
  # -------------------------------------------------------------------------
  deploy:
    name: Docker Build Available
    needs: build
    if: (github.event_name == 'push') || (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: SST deploy removed
        run: |
          echo "## Website Deploy (OSS Build)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "SST-based deployment has been removed (AC-050)." >> $GITHUB_STEP_SUMMARY
          echo "Build and deploy the Docker image instead:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'docker compose build causeflow-website' >> $GITHUB_STEP_SUMMARY
          echo 'docker compose up -d causeflow-website' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See apps/website/Dockerfile for the multi-stage build." >> $GITHUB_STEP_SUMMARY
