<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{subject}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0A14; color: #E5E7EB; }
    .wrapper { max-width: 560px; margin: 40px auto; background: #13131F; border: 1px solid #1E1E30; border-radius: 16px; overflow: hidden; }
    .header { background: linear-gradient(135deg, #13131F 0%, #1A1A2E 100%); padding: 32px 32px 24px; text-align: center; border-bottom: 1px solid #1E1E30; }
    .logo { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #6366F1; border-radius: 12px; color: #fff; font-size: 18px; font-weight: 700; }
    .brand-name { margin-top: 12px; font-size: 18px; font-weight: 600; color: #F9FAFB; }
    .content { padding: 32px; }
    h1 { font-size: 22px; font-weight: 700; color: #F9FAFB; margin-bottom: 12px; }
    p { font-size: 15px; line-height: 1.6; color: #9CA3AF; margin-bottom: 16px; }
    .inviter-box { background: #0A0A14; border: 1px solid #1E1E30; border-radius: 12px; padding: 16px 20px; margin: 16px 0; display: flex; align-items: center; gap: 12px; }
    .inviter-avatar { width: 40px; height: 40px; background: #6366F1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0; }
    .inviter-name { font-size: 15px; font-weight: 600; color: #F9FAFB; }
    .inviter-workspace { font-size: 13px; color: #6B7280; }
    .cta { display: inline-block; background: #6366F1; color: #fff; font-size: 15px; font-weight: 600; padding: 14px 28px; border-radius: 10px; text-decoration: none; margin: 8px 0 24px; }
    .cta:hover { background: #4F46E5; }
    .expire-note { font-size: 13px; color: #6B7280; }
    .divider { border: none; border-top: 1px solid #1E1E30; margin: 24px 0; }
    .footer { padding: 24px 32px; background: #0A0A14; text-align: center; }
    .footer p { font-size: 12px; color: #4B5563; margin-bottom: 4px; }
    .footer a { color: #6366F1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo">CF</div>
      <div class="brand-name">CauseFlow AI</div>
    </div>
    <div class="content">
      <h1>{{title}}</h1>
      <p>{{intro}}</p>
      <div class="inviter-box">
        <div class="inviter-avatar">{{inviterInitials}}</div>
        <div>
          <div class="inviter-name">{{inviterName}}</div>
          <div class="inviter-workspace">{{workspaceName}}</div>
        </div>
      </div>
      <p>{{body}}</p>
      <p style="text-align:center;">
        <a href="{{inviteUrl}}" class="cta">{{ctaText}}</a>
      </p>
      <p class="expire-note">{{expireNote}}</p>
      <hr class="divider">
      <p style="font-size:13px;color:#6B7280;">{{disclaimer}}</p>
    </div>
    <div class="footer">
      <p>CauseFlow AI &mdash; AI-powered incident investigation</p>
      <p><a href="https://causeflow.ai">causeflow.ai</a> &middot; <a href="https://causeflow.ai/privacy">Privacy Policy</a></p>
    </div>
  </div>
</body>
</html>
